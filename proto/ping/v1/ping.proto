syntax = "proto3";

package ping.v1;

option go_package = "github.com/unkeyed/mono-repo-test/gen/ping/v1;pingv1";

message PingRequest {
  string message = 1;
}

message PingResponse {
  string message = 1;
  string protocol = 2;
}

service PingService {
  rpc Ping(PingRequest) returns (PingResponse) {}
}
